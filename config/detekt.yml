console-reports:
    active: true
    exclude:
        #  - 'ProjectStatisticsReport'
        #  - 'ComplexityReport'
        - 'NotificationReport'
        #  - 'FindingsReport'
        - 'FileBasedFindingsReport'

output-reports:
    active: true
    exclude:
        # - 'TxtOutputReport'
        - 'XmlOutputReport'
#   - 'HtmlOutputReport'

complexity:
    active: true
    CyclomaticComplexMethod:
        active: true
        threshold: 4   # Was 15
    LargeClass:
        active: true
        threshold: 120   # Was 600
    LongMethod:
        active: true
        threshold: 12   # Was 60
    ReplaceSafeCallChainWithRun:
        active: true   # Was false

naming:
    active: true
    MemberNameEqualsClassName:
        active: false  # Was true (extension method uses)
        ignoreOverridden: true

potential-bugs:
    active: true
    WrongEqualsTypeParameter:
        active: false  # Was true (equals overloading desired)

style:
    ReturnCount:
        active: true
        excludeGuardClauses: true
