# git-cliff configuration — generates the GitHub Release body from commit history.
#
# The project uses imperative commit subjects (e.g. "add split operation"), not Conventional
# Commits, so commits are grouped by their leading verb via regex. Merge commits are dropped;
# anything unmatched lands under "Other". See docs/releasing.md.

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
filter_commits = false
sort_commits = "newest"
# Bare SemVer release tags (created by `make release VERSION=x.y.z`).
tag_pattern = '^[0-9]+\.[0-9]+\.[0-9]+$'
commit_parsers = [
  { message = '(?i)^merge ', skip = true },
  { message = '(?i)^(add|create|introduce|implement|support)', group = "Added" },
  { message = '(?i)^(fix|correct|resolve|repair)', group = "Fixed" },
  { message = '(?i)^(remove|delete|drop)', group = "Removed" },
  { message = '(?i)^(update|change|adjust|refactor|rename|move|tune|improve|simplify)', group = "Changed" },
  { message = '(?i)^(doc|docs|document)', group = "Documentation" },
  { message = '(?i).*', group = "Other" },
]
