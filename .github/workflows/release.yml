name: Release

# Triggered by pushing a bare SemVer tag (created via `make release VERSION=x.y.z`).
# jgitver turns that tag into the Maven version, and the release profile signs and uploads to Central.
on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create the GitHub release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # jgitver derives the version from the tag; git-cliff needs the history

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          # setup-java writes ~/.m2/settings.xml: a `central` server mapped to the env vars below,
          # imports the GPG key, and wires the passphrase env var for maven-gpg-plugin.
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - run: gpg --list-secret-keys --keyid-format=long

      # jgitver derives the version from git, but on a tag build the tag name IS the version, so we
      # pin it explicitly (`jgitver.use-version`). This is deterministic regardless of how the runner's
      # detached-tag checkout looks to jgitver — a plain build between tags still gets the derived
      # -SNAPSHOT, but a release is always exactly the tag (never a SNAPSHOT, which Central rejects).
      - name: Build, sign, and deploy to Maven Central
        run: ./mvnw -Prelease -Dkover.skip=true -Djgitver.use-version="$GITHUB_REF_NAME" clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      # Release notes from commit history (this project uses imperative commits, not PRs; see cliff.toml).
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip all --output RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --verify-tag
