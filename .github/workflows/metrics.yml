name: Metrics

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: metrics
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Verify on the non-baseline runtimes. Java 17 (the target baseline) is built in the publish job
  # below, where its coverage build doubles as the 17 gate — so there is no separate fourth build.
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # run every JDK even if one fails, for complete feedback
      matrix:
        java: [21, 25]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify (Java ${{ matrix.java }})
        run: make verify

  # Builds on Java 17 with coverage and publishes the dashboard. It runs only after the other
  # runtimes pass, and its own `make build` is the 17 gate + the source of the coverage report the
  # metrics script reads from this same workspace — so no build result needs to be shuttled around.
  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for churn metrics

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build with coverage (Java 17)
        run: make build
      - name: Install badge tooling
        run: pip install anybadge

      - name: Extract metrics and render dashboard
        run: python .github/scripts/metrics/generate_metrics.py

      - name: Publish to metrics branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SHA=$(git rev-parse --short HEAD)

          # Fetch the metrics branch, or bootstrap it as an orphan on first run
          if git fetch origin metrics 2>/dev/null; then
            git worktree add /tmp/metrics metrics
          else
            git worktree add --detach /tmp/metrics
            git -C /tmp/metrics checkout --orphan metrics
            git -C /tmp/metrics rm -rf --quiet . || true
          fi

          mkdir -p /tmp/metrics/badges
          # Append this run to the history kept on the metrics branch
          touch /tmp/metrics/history.ndjson
          tr -d '\n' < out/metrics.json >> /tmp/metrics/history.ndjson
          echo >> /tmp/metrics/history.ndjson

          cp out/badges/*.svg /tmp/metrics/badges/
          cp out/README.md    /tmp/metrics/README.md
          cp out/METRICS.md   /tmp/metrics/METRICS.md
          cp out/DETEKT.md    /tmp/metrics/DETEKT.md
          cp out/metrics.json /tmp/metrics/latest.json

          git -C /tmp/metrics add -A
          git -C /tmp/metrics commit -m "metrics: $SHA" || echo "No changes"
          git -C /tmp/metrics push origin metrics
