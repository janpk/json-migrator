name: Pull Request

on:
  pull_request:

# Cancel superseded runs (all matrix jobs) when new commits are pushed to the same PR.
concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # run every JDK even if one fails, for complete feedback
      matrix:
        java: [17, 21, 25]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # The library targets Java 17 bytecode; this runs the gate (formatting, tests, detekt) on each
      # supported runtime to confirm it also *runs* on 21 and 25. Coverage (Kover) is skipped here —
      # it is JDK-independent and produced once by the Metrics workflow.
      - name: Verify (Java ${{ matrix.java }})
        run: make verify
