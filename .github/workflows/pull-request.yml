name: Pull Request

on:
  pull_request:

# Cancel superseded runs when new commits are pushed to the same PR.
concurrency:
  group: pr-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # The full quality gate: clean build, formatting check, tests, detekt, and Kover coverage.
      - name: Build
        run: make build
